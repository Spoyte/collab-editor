<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collab Editor - Real-time Collaborative Coding</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #2d2d30;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3e3e42;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: '⚡';
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .room-id {
            font-family: monospace;
            background: #3e3e42;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
        }

        .status-dot.disconnected {
            background: #f44336;
        }

        .status-dot.connecting {
            background: #ff9800;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Users */
        .users {
            display: flex;
            gap: 8px;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            border: 2px solid #2d2d30;
        }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            padding: 15px;
            border-bottom: 1px solid #3e3e42;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #858585;
            margin-bottom: 10px;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 13px;
        }

        .user-item:hover {
            background: #2a2d2e;
        }

        .user-item .color-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .user-item.you {
            font-weight: 600;
        }

        .user-item.you::after {
            content: '(you)';
            margin-left: auto;
            font-size: 11px;
            color: #858585;
            font-weight: normal;
        }

        /* Editor container */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .editor-toolbar {
            background: #2d2d30;
            padding: 8px 15px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #3e3e42;
        }

        .toolbar-btn {
            background: #3e3e42;
            border: none;
            color: #ccc;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: #4e4e52;
            color: #fff;
        }

        .language-select {
            background: #3e3e42;
            border: none;
            color: #ccc;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: auto;
        }

        /* Code editor */
        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #editor {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 2;
        }

        /* Remote cursors */
        .remote-cursor {
            position: absolute;
            width: 2px;
            height: 20px;
            pointer-events: none;
            z-index: 10;
            transition: all 0.1s ease-out;
        }

        .remote-cursor::after {
            content: attr(data-user);
            position: absolute;
            top: -20px;
            left: 0;
            background: inherit;
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            white-space: nowrap;
        }

        /* Remote selections */
        .remote-selection {
            position: absolute;
            pointer-events: none;
            opacity: 0.3;
            z-index: 5;
        }

        /* Login modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: #2d2d30;
            padding: 30px;
            border-radius: 8px;
            width: 400px;
            max-width: 90%;
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #ccc;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background: #3e3e42;
            border: 1px solid #4e4e52;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007acc;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #007acc;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #005a9e;
        }

        .hidden {
            display: none !important;
        }

        /* Status bar */
        .status-bar {
            background: #007acc;
            color: #fff;
            padding: 5px 15px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal-overlay">
        <div class="modal">
            <h2>Join Collaborative Session</h2>
            <div class="form-group">
                <label for="username">Your Name</label>
                <input type="text" id="username" placeholder="Enter your name" value="">
            </div>
            <div class="form-group">
                <label for="roomId">Room ID (optional)</label>
                <input type="text" id="roomId" placeholder="Leave empty for new room">
            </div>
            <button class="btn-primary" onclick="joinRoom()">Join Session</button>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo">Collab Editor</div>
        <div class="room-info">
            <div class="connection-status">
                <span id="statusDot" class="status-dot connecting"></span>
                <span id="statusText">Connecting...</span>
            </div>
            <div id="roomId" class="room-id">-</div>
            <div id="userAvatars" class="users"></div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Connected Users</div>
                <div id="userList" class="user-list">
                    <!-- Users will be populated here -->
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Instructions</div>
                <div style="font-size: 12px; line-height: 1.6; color: #aaa;">
                    <p>📝 Start typing to collaborate in real-time</p>
                    <p style="margin-top: 8px;">🔗 Share the Room ID with others</p>
                    <p style="margin-top: 8px;">👀 See others' cursors as they type</p>
                </div>
            </div>
        </aside>

        <!-- Editor -->
        <div class="editor-container">
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="copyRoomId()">📋 Copy Room ID</button>
                <button class="toolbar-btn" onclick="downloadCode()">💾 Download</button>
                <select class="language-select" id="language" onchange="updateLanguage()">
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="json">JSON</option>
                    <option value="markdown">Markdown</option>
                </select>
            </div>
            <div class="editor-wrapper">
                <textarea id="editor" spellcheck="false"></textarea>
                <div id="remoteCursors"></div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-item">
            <span id="charCount">0 chars</span>
            <span id="lineCount">0 lines</span>
        </div>
        <div class="status-item">
            <span id="syncStatus">Ready</span>
        </div>
    </div>

    <script src="/client.js"></script>
</body>
</html>
